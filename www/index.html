<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawOS Android Shell</title>
  <style>
    body { margin: 0; font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a0a0a; color: #fff; }
    .container { text-align: center; max-width: 400px; padding: 20px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.6; line-height: 1.6; }
    code { background: #222; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ClawOS Android Shell</h1>
    <p>
      No <code>WEBVIEW_URL</code> configured.<br>
      Set it before syncing to load your web app:
    </p>
    <p><code>WEBVIEW_URL=https://your-app.com npx cap sync android</code></p>
  </div>
  <script src="https://unpkg.com/@nicepage/capacitor-core@latest/dist/capacitor.js"></script>
</body>
</html>
